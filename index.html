<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍇 配信サポートボードPro</title>
    <style>
        :root { --p: #7e57c2; --g: #66bb6a; --r: #ef5350; --bg: #f8f5fa; --text: #4a148c; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        header { background: var(--p); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content { padding: 20px; display: none; max-width: 500px; margin: auto; }
        .content.active { display: block; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        h2 { font-size: 1rem; margin: 0 0 10px 0; border-left: 4px solid var(--g); padding-left: 10px; color: var(--p); }
        .schedule-display { border-collapse: collapse; width: 100%; font-size: 0.9rem; background: #fdfaff; border-radius: 10px; }
        .schedule-display td { padding: 12px; border-bottom: 1px solid #eee; }
        .schedule-display td:first-child { font-weight: bold; color: var(--p); width: 100px; }
        .btn { border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-g { background: var(--g); color: white; }
        .btn-r { background: var(--r); color: white; margin-top: 10px; font-size: 0.8rem; }
        .list-area { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; display: none; }
        .list-item { background: #f9f9f9; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; border-radius: 5px; margin-bottom: 5px; }
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--p); font-weight: bold; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

<header>🍇 配信サポートボード</header>
<div id="loading"><div>通信中...</div></div>

<div id="tab1" class="content active">
    <div class="card">
        <h2>📅 現在の予定（全員公開）</h2>
        <table id="view-schedule" class="schedule-display">
            <tr><td>読み込み中...</td></tr>
        </table>
    </div>
    <div class="card">
        <p style="font-size:0.7rem; color:var(--p)">【ライバー専用：予定更新】</p>
        <input type="text" id="sched-period" placeholder="期間（例：3/22〜3/28）" style="width:100%; padding:10px; margin-bottom:5px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">
        <textarea id="sched-content" placeholder="予定を入力" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; height:80px; box-sizing:border-box;"></textarea>
        <button class="btn btn-p" onclick="updateSchedule()">予定を更新する</button>
    </div>
</div>

<div id="tab2" class="content">
    <div class="card">
        <h2>🎤 曲リクエスト（匿名）</h2>
        <input type="text" id="in-song" placeholder="曲名を入力" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">
        <button class="btn btn-g" onclick="sendRequest('歌枠リクエスト', 'in-song')">リクエスト送信</button>
    </div>
    <div class="card">
        <p style="font-size:0.7rem; color:var(--p)">【ライバー専用管理】</p>
        <button class="btn btn-p" onclick="toggleList('list-song')">リクエスト一覧を表示</button>
        <div id="list-song" class="list-area"></div>
        <button class="btn btn-r" onclick="resetData('歌枠リクエスト')">⚠️ リストをリセット</button>
    </div>
</div>

<div id="tab3" class="content">
    <div class="card">
        <h2>🎬 セリフ募集（匿名）</h2>
        <textarea id="in-serif" placeholder="セリフを入力" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; height:80px; box-sizing:border-box;"></textarea>
        <button class="btn btn-g" onclick="sendRequest('セリフリクエスト', 'in-serif')">セリフを送信</button>
    </div>
    <div class="card">
        <p style="font-size:0.7rem; color:var(--p)">【ライバー専用管理】</p>
        <button class="btn btn-p" onclick="toggleList('list-serif')">届いたセリフを表示</button>
        <div id="list-serif" class="list-area"></div>
        <button class="btn btn-r" onclick="resetData('セリフリクエスト')">⚠️ リストをリセット</button>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab(1)">📅予定</div>
    <div class="nav-item" onclick="showTab(2)">🎤歌枠</div>
    <div class="nav-item" onclick="showTab(3)">🎬セリフ</div>
</nav>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwBdvjj8X2Rkpz_oa5rSeqN27KinPC4J9T9oIWFX_WF8yP0p2eA2Fhh9pVUvmlminN7/exec";
    const ADMIN_PW = "3939";
    let cachedData = null;

    function showTab(n) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab'+n).classList.add('active');
        document.querySelectorAll('.nav-item')[n-1].classList.add('active');
    }

    async function loadAllData() {
        try {
            const res = await fetch(GAS_URL);
            cachedData = await res.json();
            
            // 予定表示
            const s = cachedData["予定"] || [];
            const v = document.getElementById('view-schedule');
            v.innerHTML = s.length > 1 ? `<tr><td>${s[1][0]}</td><td>${s[1][1].replace(/\n/g,'<br>')}</td></tr>` : "<tr><td>未設定</td></tr>";
            
            // リストの中身を準備（表示はさせない）
            prepareList(cachedData["歌枠リクエスト"], 'list-song');
            prepareList(cachedData["セリフリクエスト"], 'list-serif');
        } catch(e) { console.error(e); }
    }

    function prepareList(rows, id) {
        const el = document.getElementById(id);
        if(!rows || rows.length <= 1) {
            el.innerHTML = "<div class='list-item'>まだありません</div>";
            return;
        }
        el.innerHTML = "";
        rows.slice(1).reverse().forEach(r => {
            el.innerHTML += `<div class='list-item'>${r[1]}</div>`;
        });
    }

    function toggleList(id) {
        const pw = prompt("パスワードを入力してください");
        if(pw !== ADMIN_PW) return alert("パスワードが違います");
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }

    async function updateSchedule() {
        const pw = prompt("パスワードを入力");
        if(pw !== ADMIN_PW) return alert("認証失敗");
        const p = document.getElementById('sched-period').value;
        const c = document.getElementById('sched-content').value;
        if(!p || !c) return alert("入力してください");
        
        document.getElementById('loading').style.display = "flex";
        await fetch(GAS_URL, {method:"POST", body:JSON.stringify({action:"save_schedule", type:"予定", data: [[p, c]]})});
        location.reload();
    }

    async function sendRequest(type, inputId) {
        const val = document.getElementById(inputId).value;
        if(!val) return;
        document.getElementById('loading').style.display = "flex";
        await fetch(GAS_URL, {method:"POST", body:JSON.stringify({action:"add_request", type:type, data:val})});
        alert("送信しました！");
        location.reload();
    }

    async function resetData(type) {
        const pw = prompt("リセット用パスワードを入力");
        if(pw !== ADMIN_PW) return alert("認証失敗");
        if(!confirm(type + " をすべて削除しますか？")) return;
        
        document.getElementById('loading').style.display = "flex";
        await fetch(GAS_URL, {method:"POST", body:JSON.stringify({action:"reset_requests", type:type})});
        alert("リセット完了");
        location.reload();
    }

    loadAllData();
</script>
</body>
</html>
