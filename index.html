<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍇 配信サポートボードPro</title>
    <style>
        :root { --p: #7e57c2; --g: #66bb6a; --r: #ef5350; --bg: #f8f5fa; --text: #4a148c; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        header { background: var(--p); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content { padding: 20px; display: none; max-width: 500px; margin: auto; }
        .content.active { display: block; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        h2 { font-size: 1rem; margin: 0 0 10px 0; border-left: 4px solid var(--g); padding-left: 10px; color: var(--p); }
        .schedule-row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
        .schedule-row input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 0.8rem; }
        .day-input { max-width: 80px; }
        .btn { border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-p { background: var(--p); color: white; }
        .btn-g { background: var(--g); color: white; }
        .btn-r { background: var(--r); color: white; margin-top: 20px; font-size: 0.8rem; }
        .schedule-display { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
        .schedule-display td { padding: 10px; border-bottom: 1px solid #eee; }
        .schedule-display td:first-child { font-weight: bold; color: var(--p); width: 70px; }
        .list-area { margin-top: 15px; display: none; border-top: 1px solid #eee; padding-top: 10px; }
        .list-item { background: #fdfaff; border-bottom: 1px solid #eee; padding: 10px; font-size: 0.85rem; border-radius: 5px; margin-bottom: 5px; word-break: break-all; }
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--p); font-weight: bold; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

<header>🍇 配信サポートボード</header>
<div id="loading"><div>通信中...</div></div>

<div id="tab1" class="content active">
    <div class="card">
        <h2>📅 今週の予定</h2>
        <table id="view-schedule" class="schedule-display"><tr><td>読み込み中...</td></tr></table>
    </div>
    <div class="card">
        <p style="font-size:0.7rem; color:var(--p)">【管理者用：マスターパスワード(1115)が必要】</p>
        <div id="schedule-inputs"></div>
        <button class="btn btn-p" onclick="saveSchedule()">予定を更新する</button>
    </div>
</div>

<div id="tab2" class="content">
    <div class="card">
        <h2>🎤 曲リクエスト（匿名）</h2>
        <input type="text" id="in-song" placeholder="曲名などを入力" style="width:100%; box-sizing:border-box; padding:12px; border-radius:8px; border:1px solid #ddd;">
        <button class="btn btn-g" onclick="sendReq('歌枠リクエスト', 'in-song')">リクエストを送信</button>
    </div>
    <div class="card">
        <p style="font-size:0.7rem; color:var(--p)">【ライバー専用管理：パス3939】</p>
        <button class="btn btn-p" onclick="unlockAndShow('歌枠リクエスト', 'list-song')">リクエスト一覧を表示</button>
        <div id="list-song" class="list-area"></div>
        <button class="btn btn-r" onclick="resetList('歌枠リクエスト')">⚠️ リストをリセット(1115)</button>
    </div>
</div>

<div id="tab3" class="content">
    <div class="card">
        <h2>🎬 セリフ募集（匿名）</h2>
        <textarea id="in-serif" placeholder="セリフを入力" style="width:100%; box-sizing:border-box; padding:12px; border-radius:8px; border:1px solid #ddd; height:80px;"></textarea>
        <button class="btn btn-g" onclick="sendReq('セリフリクエスト', 'in-serif')">セリフを送信</button>
    </div>
    <div class="card">
        <p style="font-size:0.7rem; color:var(--p)">【ライバー専用管理：パス3939】</p>
        <button class="btn btn-p" onclick="unlockAndShow('セリフリクエスト', 'list-serif')">届いたセリフを表示</button>
        <div id="list-serif" class="list-area"></div>
        <button class="btn btn-r" onclick="resetList('セリフリクエスト')">⚠️ リストをリセット(1115)</button>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab(1)">📅予定</div>
    <div class="nav-item" onclick="showTab(2)">🎤歌枠</div>
    <div class="nav-item" onclick="showTab(3)">🎬セリフ</div>
</nav>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxeyXNrsc2a_ovAkSMyeDMiGj1fwmqGbWCVX-Y88wQXxXSlvGj7Ke_hegWg3c_AZNeX/exec"; 
    
    // --- パスワード設定完了！ ---
    const VIEW_PW = "3939";   // 一覧を見る時
    const MASTER_PW = "1115"; // 予定更新・リセット時
    // -----------------------

    function showTab(n) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab'+n).classList.add('active');
        document.querySelectorAll('.nav-item')[n-1].classList.add('active');
    }

    const inputArea = document.getElementById('schedule-inputs');
    for(let i=0; i<7; i++) {
        inputArea.innerHTML += `<div class="schedule-row"><input type="text" class="day-input" placeholder="日付"><input type="text" class="text-input" placeholder="内容"></div>`;
    }

    async function loadData() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            const sRows = data["予定"] || [];
            const view = document.getElementById('view-schedule');
            view.innerHTML = "";
            const dayInputs = document.querySelectorAll('.day-input');
            const textInputs = document.querySelectorAll('.text-input');
            if(sRows.length > 1) {
                for(let i=1; i < sRows.length; i++) {
                    if(i > 7) break;
                    view.innerHTML += `<tr><td>${sRows[i][0]}</td><td>${sRows[i][1]}</td></tr>`;
                    dayInputs[i-1].value = sRows[i][0];
                    textInputs[i-1].value = sRows[i][1];
                }
            } else { view.innerHTML = "<tr><td>未設定</td></tr>"; }
        } catch(e) { console.error(e); }
    }

    async function unlockAndShow(sheetName, displayId) {
        const pw = prompt("パスワードを入力してください");
        if(pw !== VIEW_PW) return alert("パスワードが違います");
        document.getElementById('loading').style.display = "flex";
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            const rows = data[sheetName] || [];
            const el = document.getElementById(displayId);
            el.innerHTML = "";
            if(rows.length <= 1) { el.innerHTML = "<div class='list-item'>まだありません</div>"; }
            else { rows.slice(1).reverse().forEach(r => { if(r[1]) el.innerHTML += `<div class="list-item">${r[1]}</div>`; }); }
            el.style.display = "block";
        } catch(e) { alert("通信失敗"); }
        document.getElementById('loading').style.display = "none";
    }

    async function saveSchedule() {
        const pw = prompt("マスターパスワードを入力してください");
        if(pw !== MASTER_PW) return alert("認証失敗");
        const data = [];
        const days = document.querySelectorAll('.day-input');
        const texts = document.querySelectorAll('.text-input');
        days.forEach((d, i) => { if(d.value || texts[i].value) data.push([d.value, texts[i].value]); });
        document.getElementById('loading').style.display = "flex";
        await fetch(GAS_URL, {method:"POST", body:JSON.stringify({action:"save_schedule", type:"予定", data: data})});
        location.reload();
    }

    async function sendReq(type, inputId) {
        const v = document.getElementById(inputId).value;
        if(!v) return;
        document.getElementById('loading').style.display = "flex";
        await fetch(GAS_URL, {method:"POST", body:JSON.stringify({action:"add_request", type:type, data:v})});
        alert("送信完了！");
        location.reload();
    }

    async function resetList(type) {
        const pw = prompt("マスターパスワードを入力してください");
        if(pw !== MASTER_PW) return alert("認証失敗");
        if(!confirm(type + " をリセットしますか？")) return;
        document.getElementById('loading').style.display = "flex";
        await fetch(GAS_URL, {method:"POST", body:JSON.stringify({action:"reset_requests", type:type})});
        alert("リセット完了");
        location.reload();
    }

    loadData();
</script>
</body>
</html>
